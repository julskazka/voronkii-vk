<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Vibe App</title>

  <!--
    🔒 Content Security Policy — разрешаем скрипты только с известных CDN.
    При добавлении нового CDN — добавь его домен в script-src.
    При подключении Notibot Bridge добавь: notibot.ru
  -->
  <meta http-equiv="Content-Security-Policy"
        content="
          default-src 'self';
          script-src  'self' 'unsafe-inline'
                      https://cdn.tailwindcss.com
                      https://unpkg.com
                      https://fonts.googleapis.com;
          style-src   'self' 'unsafe-inline'
                      https://fonts.googleapis.com
                      https://fonts.gstatic.com;
          font-src    'self'
                      https://fonts.gstatic.com;
          img-src     'self' data: https:;
          connect-src 'self' https:;
        " />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Стили проекта -->
  <link rel="stylesheet" href="./css/styles.css" />

  <!--
    💡 Notibot Bridge подключается здесь если нужна интеграция с Notibot.
    Используй скилл "Notibot Bridge" — агент добавит строку ниже:
    <script src="./js/notibot-bridge.js"></script>
  -->
</head>
<body>

  <!-- Корневой элемент приложения -->
  <div id="app"></div>

  <!-- Точка входа (ES Module) -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
